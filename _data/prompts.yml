  - id: writing-002
    title: 学术论文润色提示词
    tags: [写作, 学术, 润色]
    short: true
    content: |
      请对以下学术论文段落进行润色，要求：
      1. 保持原文核心观点和学术逻辑不变
      2. 修正语法错误和不规范表达
      3. 优化句式结构，使行文更流畅
      4. 确保学术用语准确、规范
      5. 不要添加原文没有的观点或论证

      待润色文本：
      [在此粘贴你的文本]

数据分析类:
  - id: data-001
    title: 数据清洗与预处理指令
    tags: [数据分析, Python, 清洗]
    short: true
    content: |
      你是一个数据分析专家。请对以下数据进行清洗和预处理：
      1. 检查缺失值并给出处理建议（删除/填充/插值）
      2. 识别异常值（使用 IQR 或 Z-score 方法）
      3. 检查数据类型是否正确
      4. 检查重复记录
      5. 给出 Python 代码实现

      数据描述：
      [在此描述你的数据]

