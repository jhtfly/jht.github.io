# ============================================
# 提示词数据文件
# ============================================
# 管理说明：
# 1. 在 GitHub 网页编辑此文件来添加/修改提示词
# 2. 每条提示词格式如下：
#    - id: 唯一标识（英文+数字，如 writing-001）
#      title: 显示标题
#      tags: [标签1, 标签2]
#      short: true/false（true=短提示词可复制，false=长提示词需下载）
#      content: 提示词正文（short: true 时填写）
#      download_url: 下载链接（short: false 时填写）
#      description: 简要说明（可选）
#      is_new: true/false（是否标记为"新"）
# 3. 下载文件放在 downloads/prompts/ 目录下

