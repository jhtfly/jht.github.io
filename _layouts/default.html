<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% feed_meta %}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">首页</a>
          <a href="{{ '/prompts.html' | relative_url }}">提示词</a>
          <a href="{{ '/skills.html' | relative_url }}">Skills</a>
          <a href="{{ '/about.html' | relative_url }}">关于</a>
        </nav>
        <button class="nav-toggle" aria-label="菜单" onclick="document.querySelector('.site-nav').classList.toggle('active')">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="site-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.author.name }}. Built with Jekyll & GitHub Pages.</p>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
